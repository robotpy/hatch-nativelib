---
name: dist

on:
  pull_request:
  push:
    branches:
    - main
    tags:
    - '*'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: psf/black@stable
  
  check-mypy:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v6
    # - uses: jpetrucciani/mypy-check@0.930
    # .. can't use that because we need to install pytest
    - uses: actions/setup-python@v6
      with:
        python-version: "3.10"
    - name: Install requirements
      run: |
        pip --disable-pip-version-check install mypy .[test]
    - name: Run mypy
      run: |
        mypy .

  #
  # Build a wheel
  #

  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - run: pipx run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist

  test:
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0
    
    - uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - name: Download build artifacts
      uses: actions/download-artifact@v7
      with:
        name: dist
        path: dist
    
    - name: Setup MSVC
      uses: bus1/cabuild/action/msdevshell@e22aba57d6e74891d059d66501b6b5aed8123c4d  # v1
      with:
        architecture: x64
      if: runner.os == 'Windows'

    - name: Install wheel
      shell: bash
      run: |
        cd dist
        python -m pip --disable-pip-version-check install $(ls *.whl)[test]
  
    - name: Test wheel
      run: python -m pytest -v

  publish:
    runs-on: ubuntu-latest
    # needs: [check, check-mypy, check-doc, build, test]
    needs: [check, check-mypy, build, test]
    permissions:
      id-token: write
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v7
      with:
        name: dist
        path: dist

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
